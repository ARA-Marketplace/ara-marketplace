name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: ""
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --features devtools"
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --features devtools"
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── System dependencies ──────────────────────────────────
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      # ── Toolchains ───────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"
          shared-key: ${{ matrix.rust_target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      # ── FFmpeg binaries ──────────────────────────────────────
      - name: Download FFmpeg (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash scripts/download-ffmpeg.sh
        env:
          TAURI_TARGET_TRIPLE: ${{ matrix.rust_target }}

      - name: Download FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/download-ffmpeg.sh

      # ── macOS: generate .icns from PNG ───────────────────────
      - name: Generate macOS .icns icon
        if: runner.os == 'macOS'
        run: |
          ICONSET_DIR=$(mktemp -d)/Ara.iconset
          mkdir -p "$ICONSET_DIR"
          SRC="app/src-tauri/icons/1024x1024.png"
          sips -z 16 16     "$SRC" --out "$ICONSET_DIR/icon_16x16.png"
          sips -z 32 32     "$SRC" --out "$ICONSET_DIR/icon_16x16@2x.png"
          sips -z 32 32     "$SRC" --out "$ICONSET_DIR/icon_32x32.png"
          sips -z 64 64     "$SRC" --out "$ICONSET_DIR/icon_32x32@2x.png"
          sips -z 128 128   "$SRC" --out "$ICONSET_DIR/icon_128x128.png"
          sips -z 256 256   "$SRC" --out "$ICONSET_DIR/icon_128x128@2x.png"
          sips -z 256 256   "$SRC" --out "$ICONSET_DIR/icon_256x256.png"
          sips -z 512 512   "$SRC" --out "$ICONSET_DIR/icon_256x256@2x.png"
          sips -z 512 512   "$SRC" --out "$ICONSET_DIR/icon_512x512.png"
          sips -z 1024 1024 "$SRC" --out "$ICONSET_DIR/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET_DIR" -o app/src-tauri/icons/icon.icns
          echo "Generated icon.icns"
          ls -la app/src-tauri/icons/icon.icns

      # ── Build & Release ──────────────────────────────────────
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: ./app
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: "Ara Marketplace v__VERSION__"
          releaseBody: |
            ## Download

            | Platform | File |
            |----------|------|
            | **Windows** | `.exe` (NSIS installer, recommended) or `.msi` |
            | **macOS (Apple Silicon)** | `.dmg` (aarch64) |
            | **macOS (Intel)** | `.dmg` (x86_64) |
            | **Linux** | `.AppImage` or `.deb` |

            ### First-launch notes

            **Windows**: SmartScreen may show "Windows protected your PC". Click **More info** then **Run anyway**.

            **macOS**: The app is ad-hoc signed (no Apple Developer certificate). On first launch:
            1. macOS will block the app.
            2. Open **System Settings > Privacy & Security**.
            3. Scroll down and click **Open Anyway** next to Ara Marketplace.
            4. Or run in Terminal: `xattr -cr /Applications/Ara\ Marketplace.app`

            **Linux**: If using AppImage, run `chmod +x` on the file first.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
